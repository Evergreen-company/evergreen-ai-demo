services:

  app:
    build: ./app
    container_name: demo-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-demo}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-always_on}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability
    labels:
      logging: "enabled"
      service: "api"
      env: "demo"

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - observability
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: demo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  loki:
    image: grafana/loki:latest
    container_name: demo-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.9.0
    container_name: demo-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  alloy:
    image: grafana/alloy:latest
    container_name: demo-alloy
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC (traces from app)
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Alloy UI
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
      - tempo
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: demo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-false}
      GF_FEATURE_TOGGLES_ENABLE: "exemplarQueryFromWidget traceToMetrics"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability


  k6:
    image: grafana/k6:latest
    container_name: demo-k6
    restart: always
    command: run /scripts/script.js
    volumes:
      - ./load-testing/k6:/scripts:ro
    environment:
      K6_BASE_URL: http://app:3000
    depends_on:
      app:
        condition: service_started
    networks:
      - observability

volumes:
  redis-data:
  prometheus-data:
  loki-data:
  tempo-data:
  alloy-data:
  grafana-data:

networks:
  observability:
    driver: bridge
