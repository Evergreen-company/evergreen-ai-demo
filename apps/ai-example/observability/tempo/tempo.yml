server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s
  flush_check_period: 10s

metrics_generator:
  registry:
    external_labels:
      source: tempo
      service: api
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    local_blocks:
      # Required for TraceQL metrics drilldown in Grafana
      filter_server_spans: false
      flush_to_storage: false

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      # local-blocks is required for TraceQL metrics drilldown (rate() queries)
      processors: [service-graphs, span-metrics, local-blocks]
